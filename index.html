<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>中学校生活お役立ちサイト</title>
<meta name="description" content="中学校生活で役立つツールをまとめたサイト。デザートじゃんけんの記録をつけると、期待値とのズレのグラフやAIによる手の予想が見られます。">
<meta name="google-site-verification" content="RCk0P5NSW028RfAzQA06UdgXTrAIsGAuMnRMAafLpcA" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='rgb(44,32,24)'/><text x='50' y='66' font-size='58' text-anchor='middle'>%F0%9F%8F%AB</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='rgb(44,32,24)'/><text x='50' y='66' font-size='58' text-anchor='middle'>%F0%9F%8F%AB</text></svg>">
<style>
  *{ box-sizing:border-box; }
  [hidden]{ display:none !important; }
  :root{
    --bg:#1c140f;
    --bg-2:#241a13;
    --card:#2c2018;
    --card-2:#352619;
    --ink:#fbf2e8;
    --muted:#bba390;
    --accent:#ff9d5c;
    --accent-2:#ffd166;
    --line:rgba(255,255,255,.08);
    --win:#9bd6a4;
    --lose:#ff8c8c;
    --skip:#8a93a8;
    --radius-lg:24px;
    --radius-md:18px;
  }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, #3a2418 0%, transparent 60%),
      linear-gradient(165deg, var(--bg), var(--bg-2));
    color:var(--ink);
    font-family:'Zen Maru Gothic', sans-serif;
    min-height:100vh;
  }
  .app{ max-width:480px; margin:0 auto; padding:26px 18px 56px; }

  header.site-header{ text-align:center; margin-bottom:26px; }
  .site-emoji{ font-size:30px; display:block; margin-bottom:6px; }
  .site-school{ font-size:13px; color:var(--muted); letter-spacing:.05em; margin:0; }
  .site-title{ font-size:24px; font-weight:900; margin:2px 0 0; color:var(--accent-2); }

  .view{ display:none; }
  .view.active{ display:block; }

  .tool-grid{ display:flex; flex-direction:column; gap:12px; }
  .tool-card{
    display:flex; align-items:center; gap:14px; text-align:left;
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius-lg);
    padding:16px 18px; cursor:pointer; color:var(--ink); font-family:inherit;
    transition:transform .15s ease, background .15s ease;
  }
  .tool-card:hover{ transform:translateY(-2px); background:var(--card-2); }
  .tool-card--soon{ cursor:default; opacity:.5; }
  .tool-card--soon:hover{ transform:none; background:var(--card); }
  .tool-icon{ font-size:30px; flex-shrink:0; }
  .tool-name{ font-weight:700; font-size:15.5px; display:block; }
  .tool-desc{ font-size:12.5px; color:var(--muted); display:block; margin-top:2px; }
  .home-note{ text-align:center; font-size:12.5px; color:var(--muted); margin-top:22px; }

  .janken-columns{ display:block; }
  .col-left, .col-right{ display:block; }
  @media (min-width: 860px){
    .app{ max-width:1080px; }
    .tool-grid{ display:grid; grid-template-columns:repeat(3, 1fr); }
    .janken-columns{ display:grid; grid-template-columns:1fr 1fr; gap:22px; align-items:start; }
  }

  .back-btn{
    background:none; border:none; color:var(--muted); font-family:inherit;
    font-size:13px; cursor:pointer; padding:6px 0; margin-bottom:10px;
  }
  .back-btn:hover{ color:var(--ink); }
  .view-title{ font-size:20px; font-weight:900; margin:0 0 6px; }
  .view-desc{ font-size:13.5px; color:var(--muted); line-height:1.7; margin:0 0 18px; }

  .panel{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius-lg);
    padding:18px; margin-bottom:16px;
  }
  .panel-title{ font-size:15px; font-weight:700; margin:0 0 14px; color:var(--accent-2); }

  .field-label{ font-size:12.5px; color:var(--muted); margin:0 0 6px; }
  .date-input, .number-input, .text-input{
    width:100%; background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius-md);
    color:var(--ink); font-family:inherit; font-size:14px; padding:10px 12px; margin-bottom:16px;
  }

  .dessert-block{
    background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:14px; margin-bottom:14px;
  }
  .dessert-heading{ font-size:13.5px; font-weight:700; color:var(--accent-2); margin:0 0 10px; }
  .dessert-num-row{ display:flex; gap:10px; }
  .dessert-num-row > div{ flex:1; min-width:0; }

  .round-block{
    background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:12px; margin-bottom:12px;
  }
  .round-block:last-child{ margin-bottom:0; }
  .hand-options, .outcome-options{ display:flex; gap:8px; }
  .hand-btn, .outcome-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius-md);
    color:var(--muted); font-family:inherit; font-size:11.5px; padding:9px 4px; cursor:pointer;
    transition:background .15s ease, border-color .15s ease, color .15s ease, transform .1s ease;
    text-align:center;
  }
  .round-block .hand-btn{ background:var(--bg-2); }
  .hand-btn span.emoji{ font-size:20px; }
  .hand-btn:hover, .outcome-btn:hover{ border-color:rgba(255,255,255,.25); }
  .hand-btn.selected{
    background:linear-gradient(160deg, var(--accent), #d9763a);
    color:#2a1505; border-color:transparent; font-weight:700;
  }
  .outcome-btn.selected.got{ background:linear-gradient(160deg, var(--win), #5fa86a); color:#10210f; border-color:transparent; font-weight:700; }
  .outcome-btn.selected.notGot{ background:linear-gradient(160deg, var(--lose), #c24f4f); color:#2a0a0a; border-color:transparent; font-weight:700; }
  .outcome-btn.selected.notJoined{ background:linear-gradient(160deg, var(--skip), #5b6378); color:#fff; border-color:transparent; font-weight:700; }
  .hand-btn:active, .outcome-btn:active{ transform:scale(.96); }

  .btn-primary{
    width:100%; font-family:inherit; font-weight:700; font-size:14.5px; color:#2a1505;
    border:none; border-radius:999px; padding:13px; cursor:pointer;
    background:linear-gradient(90deg, var(--accent-2), var(--accent));
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn-primary:hover{ transform:translateY(-1px); }
  .btn-primary:disabled{ opacity:.45; cursor:not-allowed; transform:none; }

  .records-list{ display:flex; flex-direction:column; gap:8px; }
  .record-row{
    display:flex; align-items:flex-start; gap:10px;
    background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:10px 12px; font-size:13px;
  }
  .record-date{ color:var(--muted); font-size:12px; width:78px; flex-shrink:0; margin-top:2px; }
  .record-hands{ display:flex; flex-wrap:wrap; gap:6px; flex:1; font-size:12.5px; }
  .record-hands span.rh{
    display:inline-flex; align-items:center; gap:3px; background:var(--bg);
    border:1px solid var(--line); border-radius:999px; padding:4px 9px; font-size:11.5px;
  }
  .record-del{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:4px; flex-shrink:0; }
  .record-del:hover{ color:#ff8080; }
  .empty-note{ font-size:13px; color:var(--muted); margin:4px 0 0; }
  #record-count{ color:var(--muted); font-weight:400; font-size:12.5px; }

  #trend-chart{ height:190px; padding-top:4px; }
  .trend-bars{ display:flex; gap:10px; height:100%; align-items:stretch; }
  .trend-bar-col{ flex:1; min-width:0; display:flex; flex-direction:column; height:100%; }
  .trend-upper{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; min-height:0; }
  .trend-lower{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-height:0; border-top:1px solid rgba(255,255,255,.18); }
  .trend-bar{ width:62%; max-width:26px; }
  .trend-bar-pos{ background:linear-gradient(180deg, var(--accent-2), var(--accent)); border-radius:6px 6px 3px 3px; }
  .trend-bar-neg{ background:linear-gradient(180deg, var(--lose), #c24f4f); border-radius:3px 3px 6px 6px; }
  .trend-value{ font-size:10.5px; font-weight:700; color:var(--ink); margin:2px 0; white-space:nowrap; }
  .trend-label{ font-size:10px; color:var(--muted); margin-top:6px; text-align:center; flex-shrink:0; }
  .trend-legend{ display:flex; justify-content:center; gap:16px; font-size:11px; color:var(--muted); margin-top:10px; }
  .trend-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .trend-legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; }

  .predict-panel{ text-align:center; }
  .predict-result{ margin-top:18px; }
  .forecast-row{ display:flex; justify-content:space-between; gap:10px; margin-bottom:14px; }
  .forecast-item{
    flex:1; background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:14px 6px;
  }
  .forecast-label{ font-size:11px; color:var(--muted); display:block; margin-bottom:6px; }
  .forecast-hand{ font-size:30px; display:block; }
  .forecast-reasoning{
    text-align:left; font-size:13px; line-height:1.8; color:var(--ink);
    background:var(--bg-2); border-radius:var(--radius-md); padding:12px 14px; margin:0;
  }

  .toast{
    position:fixed; left:50%; bottom:24px; transform:translate(-50%, 12px);
    background:#352619; color:var(--ink); padding:10px 18px; border-radius:999px;
    font-size:13px; border:1px solid var(--line); opacity:0; pointer-events:none;
    transition:opacity .25s ease, transform .25s ease; z-index:5; max-width:88vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translate(-50%, 0); }
</style>
</head>
<body>

<div class="app">
  <header class="site-header">
    <span class="site-emoji">🏫</span>
    <p class="site-school">JUNIOR HIGH SCHOOL LIFE</p>
    <p class="site-title">中学校生活お役立ちサイト</p>
  </header>

  <section id="view-home" class="view active">
    <div class="tool-grid">
      <button class="tool-card" id="open-dessert-janken" type="button">
        <span class="tool-icon">🍮</span>
        <span>
          <span class="tool-name">デザートじゃんけん予報</span>
          <span class="tool-desc">先生の手のクセをAIが分析・予想</span>
        </span>
      </button>
      <div class="tool-card tool-card--soon">
        <span class="tool-icon">🍱</span>
        <span>
          <span class="tool-name">給食メニュー予報</span>
          <span class="tool-desc">近日公開</span>
        </span>
      </div>
      <div class="tool-card tool-card--soon">
        <span class="tool-icon">📅</span>
        <span>
          <span class="tool-name">行事カレンダー</span>
          <span class="tool-desc">近日公開</span>
        </span>
      </div>
    </div>
    <p class="home-note">これから少しずつ、便利な欄を追加していく予定です。</p>
  </section>

  <section id="view-dessert-janken" class="view">
    <button class="back-btn" id="back-home" type="button">← ホームに戻る</button>
    <h2 class="view-title">🍮 デザートじゃんけん予報</h2>
    <p class="view-desc">デザートの種類ごとに、名前・数・参加人数・結果を記録すると、期待値とのズレの推移が見られて、AIが先生の次の手を予想してくれます。</p>

    <div class="janken-columns">
      <div class="col-left">
        <div class="panel">
          <h3 class="panel-title">記録を追加</h3>
          <p class="field-label">日付</p>
          <input type="date" id="input-date" class="date-input">

          <p class="field-label">デザートの種類の数</p>
          <input type="number" id="input-dessert-count" class="number-input" min="1" max="5" value="1">

          <div id="desserts-container"></div>

          <button class="btn-primary" id="btn-add-record" type="button">記録を追加する</button>
        </div>

        <div class="panel">
          <h3 class="panel-title">記録一覧 <span id="record-count"></span></h3>
          <div class="records-list" id="records-list"></div>
          <p class="empty-note" id="records-empty">まだ記録がありません。</p>
        </div>
      </div>

      <div class="col-right">
        <div class="panel">
          <h3 class="panel-title">勝率の推移（期待値とのズレ）</h3>
          <div id="trend-chart"></div>
          <div class="trend-legend">
            <span><i style="background:linear-gradient(180deg, var(--accent-2), var(--accent));"></i>期待値より上</span>
            <span><i style="background:linear-gradient(180deg, var(--lose), #c24f4f);"></i>期待値より下</span>
          </div>
        </div>

        <div class="panel predict-panel">
          <h3 class="panel-title">AI予報</h3>
          <button class="btn-primary" id="btn-predict" type="button">AIに予想してもらう</button>
          <p class="empty-note" id="predict-hint">まずは記録を1件以上追加してね。</p>
          <div class="predict-result" id="predict-result" hidden>
            <div class="forecast-row">
              <div class="forecast-item"><span class="forecast-label">1回目</span><span class="forecast-hand" id="fc-1"></span></div>
              <div class="forecast-item"><span class="forecast-label">2回目</span><span class="forecast-hand" id="fc-2"></span></div>
              <div class="forecast-item"><span class="forecast-label">3回目</span><span class="forecast-hand" id="fc-3"></span></div>
            </div>
            <p class="forecast-reasoning" id="fc-reasoning"></p>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var RECORDS_KEY = "dessert-janken-records-v4";
  var HAND_EMOJI = { "グー":"✊", "チョキ":"✌️", "パー":"✋" };
  var CIRCLED = ["①","②","③","④","⑤"];
  var OUTCOME_EMOJI = { got:"✅", notGot:"❌", notJoined:"🙅" };
  var OUTCOME_TEXT = { got:"ゲット", notGot:"できなかった", notJoined:"参加してない" };

  var records = [];
  var dessertsState = [];

  /* ---------- storage abstraction ---------- */
  function hasCloudStorage(){
    try { return !!(window.storage && typeof window.storage.get === 'function'); }
    catch(e){ return false; }
  }
  function storageGet(key, shared){
    if (hasCloudStorage()){
      try { return window.storage.get(key, shared).catch(function(){ return localFallbackGet(key); }); }
      catch(e){ return Promise.resolve(localFallbackGet(key)); }
    }
    return Promise.resolve(localFallbackGet(key));
  }
  function storageSet(key, value, shared){
    if (hasCloudStorage()){
      try { return window.storage.set(key, value, shared).catch(function(){ localFallbackSet(key, value); }); }
      catch(e){ localFallbackSet(key, value); return Promise.resolve(); }
    }
    localFallbackSet(key, value);
    return Promise.resolve();
  }
  function localFallbackGet(key){
    var v = null;
    try { v = localStorage.getItem(key); } catch(e){}
    return v !== null ? { key:key, value:v } : null;
  }
  function localFallbackSet(key, value){
    try { localStorage.setItem(key, value); } catch(e){}
  }

  /* ---------- view nav ---------- */
  var views = document.querySelectorAll('.view');
  function showView(id){
    views.forEach(function(v){ v.classList.toggle('active', v.id === id); });
  }
  document.getElementById('open-dessert-janken').addEventListener('click', function(){ showView('view-dessert-janken'); });
  document.getElementById('back-home').addEventListener('click', function(){ showView('view-home'); });

  var toast = document.getElementById('toast');
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 2200);
  }

  function todayStr(){
    var d = new Date();
    var m = String(d.getMonth()+1).padStart(2,'0');
    var day = String(d.getDate()).padStart(2,'0');
    return d.getFullYear() + '-' + m + '-' + day;
  }
  var dateInput = document.getElementById('input-date');
  dateInput.value = todayStr();

  /* ---------- hand / outcome button html ---------- */
  function handButtonsHtml(){
    return '<button class="hand-btn" data-hand="グー" type="button"><span class="emoji">✊</span><span>グー</span></button>' +
           '<button class="hand-btn" data-hand="チョキ" type="button"><span class="emoji">✌️</span><span>チョキ</span></button>' +
           '<button class="hand-btn" data-hand="パー" type="button"><span class="emoji">✋</span><span>パー</span></button>';
  }
  function outcomeButtonsHtml(){
    return '<button class="outcome-btn" data-outcome="got" type="button">ゲットできた</button>' +
           '<button class="outcome-btn" data-outcome="notGot" type="button">できなかった</button>' +
           '<button class="outcome-btn" data-outcome="notJoined" type="button">参加してない</button>';
  }

  /* ---------- dessert-count (type count) field ---------- */
  var dessertCountInput = document.getElementById('input-dessert-count');
  var dessertsContainerEl = document.getElementById('desserts-container');

  function clampDessertNum(v, fallback){
    var n = parseInt(v, 10);
    if (isNaN(n) || n < 1) n = fallback;
    if (n > 5) n = 5;
    return n;
  }

  function roundsBlocksHtml(dessertIndex, n){
    var html = '';
    for (var i = 1; i <= n; i++){
      html += '<div class="round-block">' +
        '<p class="field-label">' + i + '回目の先生の手</p>' +
        '<div class="hand-options" data-dessert="' + dessertIndex + '" data-round="' + i + '">' + handButtonsHtml() + '</div>' +
      '</div>';
    }
    return html;
  }

  function dessertBlockHtml(dessertIndex){
    return '<div class="dessert-block">' +
      '<p class="dessert-heading">🍡 デザート' + (CIRCLED[dessertIndex-1] || ('#'+dessertIndex)) + '</p>' +
      '<p class="field-label">デザート名</p>' +
      '<input type="text" class="text-input dessert-name" data-dessert="' + dessertIndex + '" placeholder="例：プリン">' +
      '<div class="dessert-num-row">' +
        '<div><p class="field-label">デザートの数</p>' +
          '<input type="number" class="number-input dessert-qty" data-dessert="' + dessertIndex + '" min="1" max="50" value="1"></div>' +
        '<div><p class="field-label">じゃんけんの参加人数</p>' +
          '<input type="number" class="number-input dessert-participants" data-dessert="' + dessertIndex + '" min="1" max="50" value="1"></div>' +
      '</div>' +
      '<p class="field-label">結果</p>' +
      '<div class="outcome-options" data-dessert="' + dessertIndex + '">' + outcomeButtonsHtml() + '</div>' +
      '<p class="field-label" style="margin-top:14px;">何回目まで続いた？（任意）</p>' +
      '<input type="number" class="number-input dessert-round-count" data-dessert="' + dessertIndex + '" min="1" max="10" value="1" style="margin-bottom:12px;">' +
      '<div class="dessert-rounds" data-dessert="' + dessertIndex + '">' + roundsBlocksHtml(dessertIndex, 1) + '</div>' +
    '</div>';
  }

  function attachHandListeners(containerEl){
    containerEl.querySelectorAll('.hand-options').forEach(function(group){
      var d = parseInt(group.getAttribute('data-dessert'), 10);
      var round = parseInt(group.getAttribute('data-round'), 10);
      group.querySelectorAll('.hand-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          group.querySelectorAll('.hand-btn').forEach(function(b){ b.classList.remove('selected'); });
          btn.classList.add('selected');
          dessertsState[d-1].rounds[round-1].hand = btn.getAttribute('data-hand');
        });
      });
    });
  }

  function attachDessertFieldListeners(containerEl){
    containerEl.querySelectorAll('.dessert-name').forEach(function(input){
      input.addEventListener('input', function(){
        var d = parseInt(input.getAttribute('data-dessert'), 10);
        dessertsState[d-1].name = input.value;
      });
    });
    containerEl.querySelectorAll('.dessert-qty').forEach(function(input){
      input.addEventListener('change', function(){
        var d = parseInt(input.getAttribute('data-dessert'), 10);
        var v = parseInt(input.value, 10); if (isNaN(v) || v < 1) v = 1; input.value = v;
        dessertsState[d-1].qty = v;
      });
    });
    containerEl.querySelectorAll('.dessert-participants').forEach(function(input){
      input.addEventListener('change', function(){
        var d = parseInt(input.getAttribute('data-dessert'), 10);
        var v = parseInt(input.value, 10); if (isNaN(v) || v < 1) v = 1; input.value = v;
        dessertsState[d-1].participants = v;
      });
    });
    containerEl.querySelectorAll('.outcome-options').forEach(function(group){
      var d = parseInt(group.getAttribute('data-dessert'), 10);
      group.querySelectorAll('.outcome-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          group.querySelectorAll('.outcome-btn').forEach(function(b){ b.classList.remove('selected','got','notGot','notJoined'); });
          var val = btn.getAttribute('data-outcome');
          btn.classList.add('selected', val);
          dessertsState[d-1].outcome = val;
        });
      });
    });
    attachHandListeners(containerEl);
  }

  function attachDessertRoundCountListeners(){
    dessertsContainerEl.querySelectorAll('.dessert-round-count').forEach(function(input){
      input.addEventListener('change', function(){
        var d = parseInt(input.getAttribute('data-dessert'), 10);
        var n = parseInt(input.value, 10);
        if (isNaN(n) || n < 1) n = 1;
        if (n > 10) n = 10;
        input.value = n;
        var rounds = [];
        for (var i = 0; i < n; i++){ rounds.push({ hand:null }); }
        dessertsState[d-1].rounds = rounds;
        var roundsDiv = dessertsContainerEl.querySelector('.dessert-rounds[data-dessert="' + d + '"]');
        roundsDiv.innerHTML = roundsBlocksHtml(d, n);
        attachHandListeners(roundsDiv);
      });
    });
  }

  function renderDessertBlocks(count){
    dessertsState = [];
    var html = '';
    for (var d = 1; d <= count; d++){
      dessertsState.push({ name:'', qty:1, participants:1, outcome:null, rounds:[{ hand:null }] });
      html += dessertBlockHtml(d);
    }
    dessertsContainerEl.innerHTML = html;
    attachDessertFieldListeners(dessertsContainerEl);
    attachDessertRoundCountListeners();
  }

  dessertCountInput.addEventListener('change', function(){
    var n = clampDessertNum(dessertCountInput.value, 1);
    dessertCountInput.value = n;
    renderDessertBlocks(n);
  });
  renderDessertBlocks(1);

  /* ---------- records storage (personal to each visitor) ---------- */
  function loadRecords(){
    return storageGet(RECORDS_KEY, false)
      .then(function(res){ records = res && res.value ? JSON.parse(res.value) : []; })
      .catch(function(){ records = []; })
      .then(function(){ renderRecords(); renderCharts(); });
  }
  function saveRecords(){
    return storageSet(RECORDS_KEY, JSON.stringify(records), false);
  }

  function getAllSessions(){
    var sessions = [];
    records.forEach(function(r){
      (r.desserts || []).forEach(function(ds){
        if (ds.rounds && ds.rounds.length) sessions.push(ds.rounds);
      });
    });
    return sessions;
  }
  function getAllDessertEntries(){
    var entries = [];
    records.forEach(function(r){
      (r.desserts || []).forEach(function(ds){
        entries.push({ date:r.date, name:ds.name, quantity:ds.quantity, participants:ds.participants, outcome:ds.outcome });
      });
    });
    entries.sort(function(a,b){ return a.date.localeCompare(b.date); });
    return entries;
  }

  /* ---------- records render ---------- */
  var listEl = document.getElementById('records-list');
  var emptyEl = document.getElementById('records-empty');
  var countEl = document.getElementById('record-count');
  var predictHint = document.getElementById('predict-hint');
  var btnPredict = document.getElementById('btn-predict');

  function renderRecords(){
    var sorted = records.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    listEl.innerHTML = '';
    if (sorted.length === 0){
      emptyEl.style.display = 'block';
    } else {
      emptyEl.style.display = 'none';
      sorted.forEach(function(r){
        var row = document.createElement('div');
        row.className = 'record-row';
        var countTag = '';
        if (r.dessertTypeCountInfo){
          var ci = r.dessertTypeCountInfo;
          countTag = '<span class="rh">🍮種類:' +
            (ci.type === 'range' ? (ci.min + '〜' + ci.max + '種類くらい') : (ci.count + '種類')) +
            '</span>';
        }
        var dessertsHtml = (r.desserts || []).map(function(ds){
          var handsText = (ds.rounds || []).map(function(rd, idx){ return (idx+1) + '回目' + HAND_EMOJI[rd.hand]; }).join(' ');
          return '<span class="rh">🍡' + (ds.name || '？') + '(' + ds.quantity + '個/' + ds.participants + '人) ' +
            (OUTCOME_EMOJI[ds.outcome] || '') + (OUTCOME_TEXT[ds.outcome] || '') +
            (handsText ? ' ' + handsText : '') + '</span>';
        }).join('');
        row.innerHTML =
          '<span class="record-date">' + r.date + '</span>' +
          '<span class="record-hands">' + countTag + dessertsHtml + '</span>' +
          '<button class="record-del" type="button" aria-label="削除">🗑</button>';
        row.querySelector('.record-del').addEventListener('click', function(){
          var idx = records.indexOf(r);
          if (idx > -1) records.splice(idx,1);
          saveRecords();
          renderRecords();
          renderCharts();
          resetPrediction();
        });
        listEl.appendChild(row);
      });
    }
    countEl.textContent = '（' + records.length + '件）';
    predictHint.style.display = records.length === 0 ? 'block' : 'none';
    btnPredict.disabled = records.length === 0;
  }

  function resetPrediction(){
    document.getElementById('predict-result').hidden = true;
    btnPredict.textContent = 'AIに予想してもらう';
  }

  /* ---------- trend chart: actual outcome vs expected value, over time ---------- */
  var trendChartEl = document.getElementById('trend-chart');

  function renderTrendChart(){
    var all = getAllDessertEntries().filter(function(e){
      return (e.outcome === 'got' || e.outcome === 'notGot') && e.participants > 0 && e.quantity > 0;
    });
    var recent = all.slice(-8);

    if (recent.length === 0){
      trendChartEl.innerHTML = '<p class="empty-note">まだ「ゲット/できなかった」の記録がありません。</p>';
      return;
    }

    var half = 62;
    trendChartEl.innerHTML = '<div class="trend-bars">' + recent.map(function(e){
      var expected = Math.min(e.quantity / e.participants, 1) * 100;
      var actual = e.outcome === 'got' ? 100 : 0;
      var edge = actual - expected;
      var barPx = Math.round(Math.min(Math.abs(edge), 100) / 100 * half);
      var label = e.date.slice(5).replace('-', '/');
      var valueText = (edge > 0 ? '+' : '') + Math.round(edge) + '%';

      var upperHtml = '', lowerHtml = '';
      if (edge > 0){
        upperHtml = '<span class="trend-value">' + valueText + '</span><div class="trend-bar trend-bar-pos" style="height:' + Math.max(barPx,4) + 'px"></div>';
      } else if (edge < 0){
        lowerHtml = '<div class="trend-bar trend-bar-neg" style="height:' + Math.max(barPx,4) + 'px"></div><span class="trend-value">' + valueText + '</span>';
      }
      return '<div class="trend-bar-col">' +
        '<div class="trend-upper">' + upperHtml + '</div>' +
        '<div class="trend-lower">' + lowerHtml + '</div>' +
        '<span class="trend-label">' + label + '</span>' +
      '</div>';
    }).join('') + '</div>';
  }

  function renderCharts(){
    renderTrendChart();
  }

  /* ---------- add record ---------- */
  document.getElementById('btn-add-record').addEventListener('click', function(){
    if (!dateInput.value){ showToast('日付を選んでね'); return; }
    var incomplete = dessertsState.some(function(ds){ return !ds.name.trim() || !ds.outcome; });
    if (incomplete){ showToast('デザート名と結果は、すべてのデザートで入力してね'); return; }

    var dessertTypeCountInfo = { type:'exact', count: clampDessertNum(dessertCountInput.value,1) };

    records.push({
      date: dateInput.value,
      dessertTypeCountInfo: dessertTypeCountInfo,
      desserts: dessertsState.map(function(ds){
        return {
          name: ds.name.trim(),
          quantity: ds.qty,
          participants: ds.participants,
          outcome: ds.outcome,
          rounds: ds.rounds.filter(function(r){ return r.hand; }).map(function(r){ return { hand:r.hand }; })
        };
      })
    });
    saveRecords();
    renderRecords();
    renderCharts();
    resetPrediction();
    showToast('記録を追加しました！');

    dateInput.value = todayStr();
    dessertCountInput.value = 1;
    renderDessertBlocks(1);
  });

  /* ---------- AI predict (with local fallback when the live API isn't reachable) ---------- */
  var fc1 = document.getElementById('fc-1');
  var fc2 = document.getElementById('fc-2');
  var fc3 = document.getElementById('fc-3');
  var fcReasoning = document.getElementById('fc-reasoning');
  var predictResult = document.getElementById('predict-result');

  function buildDataSummary(){
    var sorted = records.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
    return sorted.map(function(r){
      var dessertsText = (r.desserts || []).map(function(ds, di){
        var roundsText = (ds.rounds || []).map(function(rd, idx){ return (idx+1) + '回目=' + rd.hand; }).join(', ') || '(手の記録なし)';
        return 'デザート' + (di+1) + '「' + (ds.name || '？') + '」(数:' + ds.quantity + '個,参加人数:' + ds.participants + '人,結果:' + (OUTCOME_TEXT[ds.outcome] || ds.outcome) + '): ' + roundsText;
      }).join(' / ');
      return r.date + ' -> ' + dessertsText;
    }).join('\n');
  }

  function localPredict(){
    var posCounts = [{}, {}, {}];
    var overallCounts = {};
    getAllSessions().forEach(function(rounds){
      rounds.forEach(function(rd, idx){
        if (!rd.hand) return;
        if (idx < 3){ posCounts[idx][rd.hand] = (posCounts[idx][rd.hand]||0) + 1; }
        overallCounts[rd.hand] = (overallCounts[rd.hand]||0) + 1;
      });
    });
    function topHand(counts){
      var best = null, bestN = -1;
      Object.keys(counts).forEach(function(h){ if (counts[h] > bestN){ bestN = counts[h]; best = h; } });
      return best;
    }
    var overallTop = topHand(overallCounts) || 'グー';
    return {
      round1: topHand(posCounts[0]) || overallTop,
      round2: topHand(posCounts[1]) || overallTop,
      round3: topHand(posCounts[2]) || overallTop,
      reasoning: '（簡易予想）AIサーバーに接続できない環境のため、これまでの記録の中で一番多かった手をもとに予想したよ。'
    };
  }

  function showPrediction(p){
    fc1.textContent = HAND_EMOJI[p.round1] || '❓';
    fc2.textContent = HAND_EMOJI[p.round2] || '❓';
    fc3.textContent = HAND_EMOJI[p.round3] || '❓';
    fcReasoning.textContent = p.reasoning || '';
    predictResult.hidden = false;
    btnPredict.disabled = false;
    btnPredict.textContent = 'もう一度予想する';
  }

  // GitHub Pagesなど、Claudeのアーティファクト機能の外で動かす場合はこのURLを使う
  // （Cloudflare Workerなどの中継サーバーのURLをここに入れる。空のままなら直接APIに失敗した時点で簡易予想に切り替わる）
  var AI_PROXY_URL = "https://claudeai.abcd20091021.workers.dev";

  function parseAIResponse(data){
    var textBlocks = (data.content || []).filter(function(b){ return b.type === 'text'; }).map(function(b){ return b.text; });
    var raw = textBlocks.join('\n').trim();
    console.log('[janken-ai] AIからの生の文章:', raw);
    raw = raw.replace(/```json|```/g, '').trim();
    var match = raw.match(/\{[\s\S]*\}/);
    if (match) raw = match[0];
    var parsed = JSON.parse(raw);
    console.log('[janken-ai] JSONとして解釈した結果:', parsed);
    var HANDS = ['グー','チョキ','パー'];
    if (HANDS.indexOf(parsed.round1) === -1 || HANDS.indexOf(parsed.round2) === -1 || HANDS.indexOf(parsed.round3) === -1){
      throw new Error('invalid AI response shape: ' + JSON.stringify(parsed));
    }
    return parsed;
  }

  btnPredict.addEventListener('click', function(){
    btnPredict.disabled = true;
    btnPredict.innerHTML = '分析中…';
    predictResult.hidden = true;

    var systemPrompt =
      'あなたはデータ分析が得意なアシスタントです。中学校の「デザートじゃんけん」（先生とのじゃんけんでデザートをもらえるかが決まる遊び）について、' +
      '先生が過去に出した手の履歴（デザートの種類・数・参加人数・結果は参考情報として一緒に与えられます）が与えられます。デザートが複数ある日は、それぞれ別のじゃんけんセッションとして記録されています。' +
      '日付の並びや手の出方の傾向、繰り返しパターンなどを分析し、次回のじゃんけんで1回目・2回目・3回目に先生が出す手を予想してください。' +
      '出力は次のJSON形式のみで返してください。説明文やコードブロックの記号（```など）は一切含めないでください。' +
      '{"round1":"グー|チョキ|パーのいずれか","round2":"グー|チョキ|パーのいずれか","round3":"グー|チョキ|パーのいずれか","reasoning":"中学生にも分かりやすく、ちょっと楽しい口調で書いた60〜90字程度の根拠"}';

    var userPrompt = '【先生の過去の手と記録】\n' + buildDataSummary() +
      '\n\n上記から次回のじゃんけんの1回目・2回目・3回目の手を予想してください。';

    function callDirectAPI(){
      return fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:1000,
          system:systemPrompt,
          messages:[{ role:'user', content:userPrompt }]
        })
      }).then(function(res){ return res.json(); }).then(parseAIResponse);
    }

    function callProxyAPI(){
      if (!AI_PROXY_URL) return Promise.reject(new Error('no proxy configured'));
      return fetch(AI_PROXY_URL, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ system:systemPrompt, messages:[{ role:'user', content:userPrompt }] })
      }).then(function(res){ return res.json(); }).then(function(data){
        console.log('[janken-ai] プロキシからの生レスポンス:', data);
        return parseAIResponse(data);
      });
    }

    Promise.resolve()
      .then(callDirectAPI)
      .catch(callProxyAPI)
      .then(function(parsed){ showPrediction(parsed); })
      .catch(function(err){
        console.warn('[janken-ai] 簡易予想にフォールバックしました。理由:', err);
        showPrediction(localPredict());
        showToast('AIサーバーに接続できなかったので簡易予想を表示しました');
      });
  });

  /* ---------- init ---------- */
  loadRecords();
})();
</script>
</body>
</html>
